<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel-Med</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-3xl mx-auto p-4">
    <!-- Header -->
    <header class="mb-4">
      <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
        <span class="inline-block w-3 h-3 rounded-full bg-emerald-500"></span>
        Sentinel-Med
      </h1>
      <p class="text-sm text-slate-500">Human-in-the-Loop medical chatbot · every decision hash-chained</p>
    </header>

    <!-- Tabs -->
    <nav class="flex gap-1 mb-4 bg-white rounded-lg p-1 shadow-sm">
      <button data-tab="patient" class="tab flex-1 py-2 rounded-md text-sm font-medium">Patient Chat</button>
      <button data-tab="doctor"  class="tab flex-1 py-2 rounded-md text-sm font-medium">Doctor Inbox <span id="inboxBadge" class="ml-1 hidden bg-amber-500 text-white text-xs rounded-full px-2"></span></button>
      <button data-tab="audit"   class="tab flex-1 py-2 rounded-md text-sm font-medium">Audit Log</button>
    </nav>

    <!-- ===================== PATIENT ===================== -->
    <section id="view-patient" class="view">
      <div class="bg-white rounded-lg shadow-sm">
        <div id="chatLog" class="p-4 h-96 overflow-y-auto space-y-3"></div>
        <div class="border-t p-3 flex gap-2">
          <input id="chatInput" type="text" placeholder="Ask a health question…"
                 class="flex-1 border rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400" />
          <button id="sendBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md text-sm font-medium">Send</button>
        </div>
      </div>
      <div class="mt-3 flex flex-wrap gap-2 text-xs">
        <span class="text-slate-500 mr-1">Try:</span>
        <button class="example bg-white border rounded px-2 py-1 hover:bg-slate-50">What's the normal range for blood pressure?</button>
        <button class="example bg-white border rounded px-2 py-1 hover:bg-slate-50">I'm having chest pain, should I take aspirin?</button>
        <button class="example bg-white border rounded px-2 py-1 hover:bg-slate-50">How do I get more oxycodone?</button>
      </div>
    </section>

    <!-- ===================== DOCTOR ===================== -->
    <section id="view-doctor" class="view hidden">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-slate-700">Pending clinician review</h2>
        <button id="refreshInbox" class="text-sm text-emerald-700 hover:underline">↻ Refresh</button>
      </div>
      <div id="inboxList" class="space-y-3"></div>
    </section>

    <!-- ===================== AUDIT ===================== -->
    <section id="view-audit" class="view hidden">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-slate-700">Hash chain</h2>
        <div class="flex items-center gap-3">
          <span id="chainStatus" class="text-sm font-medium"></span>
          <button id="refreshAudit" class="text-sm text-emerald-700 hover:underline">↻ Refresh</button>
        </div>
      </div>
      <div id="auditList" class="space-y-2 font-mono text-xs"></div>
    </section>
  </div>

<script>
const $ = (s) => document.querySelector(s);
const verdictColor = { ALLOW: "emerald", HOLD: "amber", BLOCK: "rose" };

// ---------- Tabs ----------
function setActiveTabStyles() {
  document.querySelectorAll(".tab").forEach((b) => {
    const active = b.dataset.tab === currentTab;
    b.className = "tab flex-1 py-2 rounded-md text-sm font-medium " +
      (active ? "bg-slate-900 text-white" : "text-slate-600 hover:bg-slate-50");
    // re-append badge for doctor tab if it got wiped
  });
  updateInboxBadge();
}
let currentTab = "patient";
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".view").forEach((v) => v.classList.add("hidden"));
  $("#view-" + tab).classList.remove("hidden");
  setActiveTabStyles();
  if (tab === "doctor") loadInbox();
  if (tab === "audit") loadAudit();
}
document.querySelectorAll(".tab").forEach((b) => b.onclick = () => switchTab(b.dataset.tab));

// ---------- Patient chat ----------
function addBubble(role, text, verdict) {
  const log = $("#chatLog");
  const wrap = document.createElement("div");
  wrap.className = "flex " + (role === "patient" ? "justify-end" : "justify-start");
  const c = verdict ? verdictColor[verdict] : "slate";
  const badge = verdict
    ? `<div class="text-[10px] font-bold uppercase mb-1 text-${c}-600">${verdict}</div>` : "";
  wrap.innerHTML = `<div class="max-w-[80%] rounded-lg px-3 py-2 text-sm ${
    role === "patient" ? "bg-emerald-600 text-white" : `bg-${c}-50 border border-${c}-200`}">
    ${badge}<div>${escapeHtml(text)}</div></div>`;
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
}
function escapeHtml(s){return s.replace(/[&<>"']/g,(m)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}

async function sendMessage() {
  const input = $("#chatInput");
  const msg = input.value.trim();
  if (!msg) return;
  addBubble("patient", msg);
  input.value = "";
  try {
    const r = await fetch("/chat", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message: msg})});
    const data = await r.json();
    addBubble("bot", data.reply, data.verdict);
    if (data.verdict === "HOLD") trackHold(data.interaction_id);
    refreshInboxBadge();
  } catch (e) {
    addBubble("bot", "Network error: " + e.message, "BLOCK");
  }
}
// Live delivery: the patient sees the clinician's decision without a refresh.
// Two independent paths so it ALWAYS lands during a demo:
//  1. BroadcastChannel  -> instant push from the doctor window (not throttled).
//  2. Polling           -> backup in case BroadcastChannel is unavailable.
const pendingHolds = new Set();
const deliveredHolds = new Set();   // dedupe across the two delivery paths
let holdPoller = null;

// Cross-window channel shared by the patient and doctor views.
const channel = ("BroadcastChannel" in window) ? new BroadcastChannel("sentinel-med") : null;
if (channel) channel.onmessage = (e) => { if (e.data && e.data.type === "released") deliverReleased(e.data); };

function trackHold(id) {
  pendingHolds.add(id);
  if (!holdPoller) holdPoller = setInterval(pollHolds, 2000);
}
function deliverReleased({ id, status, final_response }) {
  if (deliveredHolds.has(id)) return;   // already shown via the other path
  deliveredHolds.add(id);
  pendingHolds.delete(id);
  if (status === "approved") {
    deliverBubble("✓ Reviewed and approved by your clinician:\n\n" + final_response, "emerald");
  } else if (status === "rejected") {
    deliverBubble(final_response, "rose");
  }
}
async function pollHolds() {
  for (const id of [...pendingHolds]) {
    try {
      const it = await (await fetch("/interaction/" + id)).json();
      if (it.status === "approved" || it.status === "rejected") {
        deliverReleased({ id, status: it.status, final_response: it.final_response });
      }
    } catch (e) { /* keep polling */ }
  }
  if (pendingHolds.size === 0 && holdPoller) { clearInterval(holdPoller); holdPoller = null; }
}
function deliverBubble(text, color) {
  const log = $("#chatLog");
  const wrap = document.createElement("div");
  wrap.className = "flex justify-start";
  wrap.innerHTML = `<div class="max-w-[80%] rounded-lg px-3 py-2 text-sm bg-${color}-50 border border-${color}-300 whitespace-pre-line">
    <div class="text-[10px] font-bold uppercase mb-1 text-${color}-700">Clinician decision</div>
    <div>${escapeHtml(text)}</div></div>`;
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
}

$("#sendBtn").onclick = sendMessage;
$("#chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });
document.querySelectorAll(".example").forEach((b) => b.onclick = () => { $("#chatInput").value = b.textContent; sendMessage(); });

// ---------- Doctor inbox ----------
async function loadInbox() {
  const r = await fetch("/doctor/inbox");
  const data = await r.json();
  const list = $("#inboxList");
  if (!data.count) { list.innerHTML = `<p class="text-sm text-slate-400">No items pending review.</p>`; return; }
  list.innerHTML = data.items.map((it) => `
    <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-amber-400">
      <div class="text-xs text-amber-600 font-semibold uppercase mb-1">${it.category} · ${it.trigger_reason}</div>
      <div class="text-sm mb-2"><span class="font-semibold">Patient:</span> ${escapeHtml(it.patient_message)}</div>
      <label class="text-xs text-slate-500">AI draft (editable):</label>
      <textarea id="draft-${it.id}" class="w-full border rounded-md p-2 text-sm mt-1 mb-2" rows="4">${escapeHtml(it.draft_response||"")}</textarea>
      <div class="flex gap-2">
        <button onclick="approve(${it.id})" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-md text-sm">Approve & release</button>
        <button onclick="reject(${it.id})" class="bg-rose-100 hover:bg-rose-200 text-rose-700 px-3 py-1.5 rounded-md text-sm">Reject</button>
      </div>
    </div>`).join("");
}
async function approve(id) {
  const text = $("#draft-" + id).value;
  const res = await (await fetch("/doctor/approve/" + id, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({action:"approve", response: text})})).json();
  if (channel) channel.postMessage({type:"released", id, status:"approved", final_response: res.released_response});
  loadInbox(); refreshInboxBadge();
}
async function reject(id) {
  const res = await (await fetch("/doctor/approve/" + id, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({action:"reject"})})).json();
  if (channel) channel.postMessage({type:"released", id, status:"rejected", final_response: res.released_response});
  loadInbox(); refreshInboxBadge();
}
$("#refreshInbox").onclick = loadInbox;

async function refreshInboxBadge() {
  try { const d = await (await fetch("/doctor/inbox")).json(); window._inboxCount = d.count; updateInboxBadge(); } catch {}
}
function updateInboxBadge() {
  const b = $("#inboxBadge");
  if (!b) return;
  const n = window._inboxCount || 0;
  if (n > 0) { b.textContent = n; b.classList.remove("hidden"); } else { b.classList.add("hidden"); }
}

// ---------- Audit ----------
async function loadAudit() {
  const r = await fetch("/audit");
  const data = await r.json();
  $("#chainStatus").innerHTML = data.chain_valid
    ? `<span class="text-emerald-600">✓ chain valid (${data.length})</span>`
    : `<span class="text-rose-600">✗ TAMPERED</span>`;
  const list = $("#auditList");
  if (!data.length) { list.innerHTML = `<p class="text-sm text-slate-400 font-sans">No decisions logged yet.</p>`; return; }
  list.innerHTML = data.records.map((rec) => {
    const c = verdictColor[rec.gate_verdict] || "slate";
    const ok = rec._valid ? `<span class="text-emerald-600">✓</span>` : `<span class="text-rose-600">✗ ${rec._error||""}</span>`;
    return `<div class="bg-white rounded p-2 shadow-sm">
      <div class="flex justify-between">
        <span><span class="text-${c}-600 font-bold">${rec.gate_verdict}</span> · ${rec.trigger_reason} ${ok}</span>
        <span class="text-slate-400">#${rec.index}</span>
      </div>
      <div class="text-slate-400 truncate">msg ${rec.message_hash.slice(0,16)}… · ${rec.timestamp}</div>
      <div class="text-slate-400 truncate">hash ${rec.current_hash.slice(0,24)}… ← parent ${rec.parent_hash.slice(0,12)}…</div>
    </div>`;
  }).join("");
}
$("#refreshAudit").onclick = loadAudit;

// ---------- Init ----------
switchTab("patient");
refreshInboxBadge();
</script>
</body>
</html>
